services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: betbotsite
    ports:
      - "127.0.0.1:4201:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
